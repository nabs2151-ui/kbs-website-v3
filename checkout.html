<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Checkout — KBS</title>

 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
 <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

 <style>
   :root {
     --kbs-cream:   #faf6f0;
     --kbs-sand:    #f1ebe1;
     --kbs-beige:   #ede4d3;
     --kbs-dark:    #2c2a27;
     --kbs-accent:  #b7895a;
   }

   body {
     font-family: 'Segoe UI', Tahoma, sans-serif;
     background-color: var(--kbs-cream);
     color: var(--kbs-dark);
   }

   .navbar-brand { font-weight: 700; letter-spacing: 1px; }
   .navbar-custom { background-color: var(--kbs-dark) !important; }

   .checkout-section { padding: 50px 0 80px; }

   .form-card, .summary-card {
     background-color: #fffdf9;
     border: 1px solid var(--kbs-beige);
     border-radius: 10px;
     padding: 25px;
     margin-bottom: 20px;
   }

   .summary-card {
     background-color: var(--kbs-sand);
     position: sticky;
     top: 90px;
   }

   .summary-row {
     display: flex;
     justify-content: space-between;
     margin-bottom: 10px;
   }
   
   .summary-total {
     border-top: 1px solid var(--kbs-beige);
     padding-top: 12px;
     margin-top: 12px;
     font-size: 1.2rem;
     font-weight: 700;
     color: var(--kbs-dark);
   }

   .btn-kbs {
     background-color: var(--kbs-accent);
     color: #fff;
     border: none;
   }
   .btn-kbs:hover { background-color: #9c7249; color: #fff; }

   footer {
     background: var(--kbs-dark);
     color: #d4c9b5;
     padding: 25px 0;
     margin-top: 60px;
   }
 </style>
</head>
<body>

 <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
   <div class="container">
     <a class="navbar-brand" href="index.html">
       <i class="bi bi-cup-hot-fill"></i> KBS
     </a>
     <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
             data-bs-target="#mainNav" aria-controls="mainNav"
             aria-expanded="false" aria-label="Toggle navigation">
       <span class="navbar-toggler-icon"></span>
     </button>
     <div class="collapse navbar-collapse" id="mainNav">
       <ul class="navbar-nav me-auto mb-2 mb-lg-0">
         <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
         <li class="nav-item"><a class="nav-link" href="index.html#products">Shop</a></li>
       </ul>
       <a href="cart.html" class="btn btn-warning position-relative text-decoration-none">
         <i class="bi bi-cart-fill"></i> Cart
       </a>
     </div>
   </div>
 </nav>

 <section class="checkout-section">
   <div class="container">
     <h2 class="mb-4">Checkout (Cash on Delivery)</h2>

     <div class="row g-4">
       <div class="col-lg-7">
         <div class="form-card">
           <h5 class="mb-4">Shipping Details</h5>
           <form id="checkoutForm">
             <div class="mb-3">
               <label for="name" class="form-label">Full Name</label>
               <input type="text" class="form-control" id="name" required>
             </div>
             <div class="row mb-3">
               <div class="col-md-6">
                 <label for="email" class="form-label">Email Address</label>
                 <input type="email" class="form-control" id="email" required>
               </div>
               <div class="col-md-6">
                 <label for="phone" class="form-label">Phone Number</label>
                 <input type="tel" class="form-control" id="phone" required>
               </div>
             </div>
             <div class="mb-3">
               <label for="address" class="form-label">Delivery Address</label>
               <textarea class="form-control" id="address" rows="3" required></textarea>
             </div>
             
             <button type="submit" class="btn btn-kbs w-100 mt-3" id="submitBtn">
               Confirm Order & Place
             </button>
           </form>
         </div>
       </div>

       <div class="col-lg-5">
         <div class="summary-card" id="summaryBox">
           </div>
       </div>
     </div>
   </div>
 </section>

 <footer class="text-center">
   <div class="container">
     <p class="mb-1">&copy; 2026 KBS — Khokhar Bartan Store. All rights reserved.</p>
   </div>
 </footer>

 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
 
 <script src="products.js"></script>

 <script>
   const CART_KEY = 'kbs_cart';
   
   // ====== GOOGLE APPS SCRIPT URL ======
   // PASTE YOUR DEPLOYED WEB APP URL HERE:
   const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxj1J70XrkpspWJZX5uVpQz-m2GlMvVAg0xZwm4p9UvW8otnuPEEfTZ06EZ2EiCdGwc2g/exec'; 

   function getCart() {
     return JSON.parse(localStorage.getItem(CART_KEY)) || {};
   }

   function computeSummary(cart) {
     let subtotal = 0;
     let itemCount = 0;
     let itemDetails = []; // To build a string of items for the spreadsheet

     for (const id in cart) {
       // PRODUCTS is automatically loaded from products.js!
       const p = PRODUCTS.find(x => x.id === id);
       if (p) {
         subtotal += p.price * cart[id];
         itemCount += cart[id];
         itemDetails.push(`${cart[id]}x ${p.name}`); // e.g., "2x Tray set"
       }
     }
     const shipping = subtotal === 0 ? 0 : (subtotal >= 2000 ? 0 : 49);
     return { 
       subtotal, 
       shipping, 
       total: subtotal + shipping, 
       itemCount, 
       itemString: itemDetails.join(', ') 
     };
   }

   // ====== RENDER SUMMARY ======
   function renderSummary() {
     const cart = getCart();
     const s = computeSummary(cart);
     const summaryBox = document.getElementById('summaryBox');

     if (s.itemCount === 0) {
       summaryBox.innerHTML = `<p>Your cart is empty. <a href="index.html">Go back to shop.</a></p>`;
       document.getElementById('submitBtn').disabled = true;
       return;
     }

     summaryBox.innerHTML = `
       <h5 class="mb-4">Order Summary</h5>
       <div class="summary-row">
         <span>Items (${s.itemCount})</span>
         <span>PKR ${s.subtotal.toLocaleString('en-IN')}</span>
       </div>
       <div class="summary-row">
         <span>Shipping</span>
         <span>${s.shipping === 0 ? 'FREE' : 'PKR ' + s.shipping}</span>
       </div>
       <div class="summary-row summary-total">
         <span>Total to Pay (COD)</span>
         <span>PKR ${s.total.toLocaleString('en-IN')}</span>
       </div>
       <div class="mt-3 small text-muted">
         <strong>Items in cart:</strong><br>
         ${s.itemString}
       </div>
     `;
   }

   // ====== HANDLE FORM SUBMISSION ======
   document.getElementById('checkoutForm').addEventListener('submit', async function(e) {
     e.preventDefault(); // Prevent page reload

     const cart = getCart();
     const s = computeSummary(cart);
     const submitBtn = document.getElementById('submitBtn');

     // Gather user info
     const name = document.getElementById('name').value;
     const email = document.getElementById('email').value;
     const phone = document.getElementById('phone').value;
     const address = document.getElementById('address').value;

     // Prepare data payload for Google Apps Script
     const orderData = {
       name: name,
       email: email,
       phone: phone,
       address: address,
       item: s.itemString,
       price: `PKR ${s.total}`
     };

     // Change button text to show loading
     submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Processing...';
     submitBtn.disabled = true;

     try {
       const response = await fetch(GOOGLE_SCRIPT_URL, {
         method: 'POST',
         headers: { 'Content-Type': 'text/plain;charset=utf-8' },
         body: JSON.stringify(orderData)
       });

       const result = await response.json();
       
       if (result.result === 'success') {
         // Clear the cart
         localStorage.removeItem(CART_KEY);
         alert("Order placed successfully! We will contact you soon for delivery.");
         window.location.href = 'index.html'; // Redirect to home
       } else {
         alert("There was an issue placing your order. Please try again.");
         console.error(result.error);
         submitBtn.innerHTML = 'Confirm Order & Place';
         submitBtn.disabled = false;
       }
     } catch (error) {
       console.error("Error connecting to server:", error);
       alert("Failed to connect to the server. Please check your internet connection.");
       submitBtn.innerHTML = 'Confirm Order & Place';
       submitBtn.disabled = false;
     }
   });

   // Init
   renderSummary();
 </script>
</body>
</html>
